version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tams_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tams_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tams_password}
      POSTGRES_DB: ${DB_NAME:-tams_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-tams_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tams_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-tams_redis_pass}
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tams_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-tams_user}:${DB_PASSWORD:-tams_password}@postgres:5432/${DB_NAME:-tams_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-tams_redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      OFFICE_LAT: ${OFFICE_LAT}
      OFFICE_LNG: ${OFFICE_LNG}
      OFFICE_RADIUS_METERS: ${OFFICE_RADIUS_METERS:-200}
    ports:
      - '4000:4000'
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_OFFICE_LAT: ${OFFICE_LAT}
        VITE_OFFICE_LNG: ${OFFICE_LNG}
        VITE_OFFICE_RADIUS: ${OFFICE_RADIUS_METERS:-200}
    container_name: tams_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

  nginx:
    image: nginx:alpine
    container_name: tams_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  uploads:
