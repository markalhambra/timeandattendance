<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
  body { margin: 0; background: #f9fafb; width: 1280px; height: 800px; overflow: hidden; }
  .shadow-card { box-shadow: 0 1px 3px 0 rgba(0,0,0,.1), 0 1px 2px -1px rgba(0,0,0,.1); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .badge-green  { background:#dcfce7; color:#15803d; }
  .badge-yellow { background:#fef9c3; color:#92400e; }
  .badge-red    { background:#fee2e2; color:#b91c1c; }
  .badge-blue   { background:#dbeafe; color:#1d4ed8; }
  .badge-gray   { background:#f3f4f6; color:#374151; }
  .badge-black  { background:#000; color:#fff; }
  input, select, textarea { outline: none; }
  input:focus, select:focus, textarea:focus { ring: 2px solid #000; }
</style>
</head>
<body class="flex flex-col">

  <header class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-6 h-6 flex flex-col gap-1 cursor-pointer"><span class="block h-0.5 bg-gray-600 w-5"></span><span class="block h-0.5 bg-gray-600 w-5"></span><span class="block h-0.5 bg-gray-600 w-5"></span></div>
      <span class="text-sm text-gray-500 hidden md:block">Wednesday, July 9, 2026 &nbsp;|&nbsp; 09:14 AM</span>
    </div>
    <div class="flex items-center gap-3">
      <button class="relative p-2 rounded-full hover:bg-gray-100 text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.437L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
      </button>
      <button class="w-7 h-7 rounded-full bg-gray-100 text-gray-600 text-xs font-bold flex items-center justify-center hover:bg-gray-200">?</button>
      <div class="flex items-center gap-2 pl-2 border-l border-gray-200">
        <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center text-sm font-bold">J</div>
        <div class="hidden sm:block">
          <p class="text-sm font-semibold text-gray-800 leading-none">Juan dela Cruz</p>
          <p class="text-xs text-gray-400 leading-none mt-0.5">Employee</p>
        </div>
      </div>
    </div>
  </header>
<div class="flex flex-1 overflow-hidden" style="height:calc(800px - 57px)">

  <aside class="w-56 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col h-full">
    <div class="px-5 pt-5 pb-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-black flex items-center justify-center text-white font-black text-sm">A</div>
        <div>
          <p class="text-xs font-black text-gray-900 leading-none">ALPAS</p>
          <p class="text-[10px] text-gray-400 leading-none">Time &amp; Attendance</p>
        </div>
      </div>
    </div>
    <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2">
      <div class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600">J</div>
      <div>
        <p class="text-sm font-semibold text-gray-800 leading-none">Juan dela Cruz</p>
        <p class="text-xs text-gray-400 mt-0.5">Employee</p>
      </div>
    </div>
    <nav class="flex-1 px-3 py-3 space-y-0.5 overflow-y-auto">
      <div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-colors text-gray-600 hover:bg-gray-100"><span class="text-base">⊞</span>Dashboard</div>
<div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-colors text-gray-600 hover:bg-gray-100"><span class="text-base">◷</span>Attendance</div>
<div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-colors bg-black text-white"><span class="text-base">◈</span>Leave</div>
<div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-colors text-gray-600 hover:bg-gray-100"><span class="text-base">⊕</span>Overtime</div>

    </nav>
    <div class="px-3 pb-4 border-t border-gray-100 pt-3 space-y-1">
      <div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-100 cursor-pointer"><span>👤</span> My Profile</div>
      <div class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-red-600 hover:bg-red-50 cursor-pointer"><span>⎋</span> Sign Out</div>
    </div>
  </aside>
<main class="flex-1 overflow-y-auto p-6 bg-gray-50">

<div class="flex items-center justify-between mb-5">
  <h1 class="text-2xl font-black text-gray-900">Leave Requests</h1>
  <button class="px-4 py-2 bg-black text-white rounded-lg text-sm font-semibold">+ File Leave</button>
</div>
<!-- Modal -->
<div class="fixed inset-0 bg-black bg-opacity-30" style="top:57px;left:224px;"></div>
<div class="absolute inset-0 flex items-center justify-center" style="top:57px;left:224px;">
  <div class="bg-white rounded-2xl shadow-2xl border border-gray-200 w-full max-w-md p-6 relative">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-bold text-gray-900">File Leave Request</h3>
      <button class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 text-lg">&times;</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Leave Type</label>
        <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
          <option>Vacation Leave (VL)</option>
          <option>Sick Leave (SL)</option>
          <option>Emergency Leave</option>
          <option>Paternity Leave</option>
          <option>Maternity Leave</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
          <input type="date" value="2026-07-15" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
          <input type="date" value="2026-07-16" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"/>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
        <textarea rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-none" placeholder="Briefly describe the reason for your leave...">Family vacation</textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Supporting Document <span class="text-gray-400">(optional)</span></label>
        <div class="border-2 border-dashed border-gray-200 rounded-lg p-4 text-center text-sm text-gray-400 cursor-pointer hover:border-gray-400">
          Click to upload or drag &amp; drop a file
        </div>
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button class="flex-1 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700">Cancel</button>
      <button class="flex-1 px-4 py-2 bg-black text-white rounded-lg text-sm font-semibold">Submit</button>
    </div>
  </div>
</div>

</main>
</div>
</body>
</html>
