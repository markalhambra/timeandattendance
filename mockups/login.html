<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
  body { margin: 0; background: #f9fafb; width: 1280px; height: 800px; overflow: hidden; }
  .shadow-card { box-shadow: 0 1px 3px 0 rgba(0,0,0,.1), 0 1px 2px -1px rgba(0,0,0,.1); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .badge-green  { background:#dcfce7; color:#15803d; }
  .badge-yellow { background:#fef9c3; color:#92400e; }
  .badge-red    { background:#fee2e2; color:#b91c1c; }
  .badge-blue   { background:#dbeafe; color:#1d4ed8; }
  .badge-gray   { background:#f3f4f6; color:#374151; }
  .badge-black  { background:#000; color:#fff; }
  input, select, textarea { outline: none; }
  input:focus, select:focus, textarea:focus { ring: 2px solid #000; }
</style>
</head>
<body class="flex flex-col">

<div class="flex items-center justify-center h-screen bg-gray-50">
  <div class="bg-white rounded-2xl shadow-card p-10 w-96 border border-gray-200">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center text-white font-black text-lg">A</div>
      <div>
        <p class="font-black text-gray-900 text-base leading-none">ALPAS</p>
        <p class="text-xs text-gray-400">Time &amp; Attendance System</p>
      </div>
    </div>
    <h2 class="text-xl font-bold text-gray-900 mb-6">Sign in to your account</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" value="juan.delacruz@company.ph" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-black focus:border-transparent"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" value="••••••••" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"/>
      </div>
    </div>
    <div class="mt-1 text-right">
      <a href="#" class="text-xs text-gray-500 hover:underline">Forgot password?</a>
    </div>
    <button class="mt-5 w-full bg-black text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-gray-800 transition-colors">Sign In</button>
    <p class="text-xs text-gray-400 text-center mt-4">Secured with 256-bit encryption</p>
  </div>
</div>
</body>
</html>
